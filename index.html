body {
  margin:0;
  font-family:'Lato', sans-serif;
  background:#f5f5f5;
  transition:0.3s;
}

/* DARK MODE */
body.dark {
  background:#121212;
  color:#fff;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  color:#fff;
}

nav a {
  margin:0 10px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  color:#fff;
}

.hero h1 {
  font-size:2.5em;
}

.hero button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
}

/* PRODUCTS */
.products {
  display:flex;
  gap:15px;
  padding:20px;
  overflow-x:auto;
}

.product {
  min-width:200px;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
