<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews - Sakhile's iPhone Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#74ebd5;
  --gradient:linear-gradient(135deg,#74ebd5,#ACB6E5);
  --dark:#0f172a;
}

body{
  margin:0;
  font-family:'Lato',sans-serif;
  background:url('images/background1.avif') center/cover fixed;
  color:#333;
  transition:0.3s;
}
body.dark{
  background:#0f172a;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:var(--gradient);
  position:sticky;
  top:0;
  z-index:1000;
}
header h1{color:#fff;}
nav a{
  color:#fff;
  margin:0 8px;
  padding:8px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  text-decoration:none;
}
nav a.active,nav a:hover{
  background:#fff;
  color:#333;
}

/* TOP BAR */
.top-bar{
  display:flex;
  gap:10px;
}
.icon-btn{
  background:#fff;
  border:none;
  padding:8px 12px;
  border-radius:50%;
  cursor:pointer;
  font-size:16px;
}

/* SECTION */
section{
  max-width:1200px;
  margin:30px auto;
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.85);
}
body.dark section{
  background:rgba(0,0,0,0.6);
}

/* TITLE */
h2{
  text-align:center;
  font-size:2.2em;
  margin-bottom:20px;
}

/* REVIEW GRID */
.reviews{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  padding:20px;
  border-radius:12px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}
body.dark .card{
  background:#1e293b;
}
.card:hover{
  transform:translateY(-5px);
}

/* USER */
.user{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}
.user img{
  width:45px;
  height:45px;
  border-radius:50%;
  margin-right:10px;
}

/* STARS */
.stars{
  color:#fbbf24;
  margin-top:5px;
}

/* ADD REVIEW */
.form{
  margin-top:40px;
}
.form input,.form textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
.form button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:var(--gradient);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>Sakhile's iPhone Studio</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="reviews.html" class="active">Reviews</a>
  </nav>

  <div class="top-bar">
    <button class="icon-btn" onclick="toggleDark()">🌙</button>
    <button class="icon-btn">🛒 <span id="cartCount">0</span></button>
  </div>
</header>

<!-- MAIN -->
<section>
  <h2>⭐ Customer Reviews</h2>

  <div class="reviews" id="reviews"></div>

  <!-- ADD REVIEW -->
  <div class="form">
    <h3>Add Your Review</h3>
    <input type="text" id="name" placeholder="Your name">
    <textarea id="text" placeholder="Write your review..."></textarea>
    <button onclick="addReview()">Submit Review</button>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2025 Sakhile's iPhone Studio</p>
</footer>

<script>
/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* SAMPLE REVIEWS */
let reviews=[
  {name:"Sakhile",text:"Best iPhones in SA 🔥",rating:5,img:"https://i.pravatar.cc/100?img=1"},
  {name:"Thabo",text:"Fast delivery and legit phones",rating:4,img:"https://i.pravatar.cc/100?img=2"},
  {name:"Lerato",text:"Amazing service ❤️",rating:5,img:"https://i.pravatar.cc/100?img=3"}
];

/* RENDER */
function render(){
  let container=document.getElementById("reviews");
  container.innerHTML="";
  reviews.forEach(r=>{
    container.innerHTML+=`
      <div class="card">
        <div class="user">
          <img src="${r.img}">
          <strong>${r.name}</strong>
        </div>
        <p>${r.text}</p>
        <div class="stars">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</div>
      </div>
    `;
  });
}
render();

/* ADD REVIEW */
function addReview(){
  let name=document.getElementById("name").value;
  let text=document.getElementById("text").value;

  if(!name||!text){
    alert("Fill all fields");
    return;
  }

  reviews.unshift({
    name,
    text,
    rating:5,
    img:"https://i.pravatar.cc/100"
  });

  render();

  document.getElementById("name").value="";
  document.getElementById("text").value="";
}

/* CART COUNT (sync with products page) */
let cart=JSON.parse(localStorage.getItem("cart"))||[];
document.getElementById("cartCount").innerText=cart.length;
</script>

</body>
</html>
