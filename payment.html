<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay - Sakhile iPhone Store</title>
<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="cursor"></div>

<header>
  <div class="header-left">
    <img src="images/Logo.png" alt="Logo">
    <h2>Sakhile Store</h2>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="repair.html">Repair</a>
    <a href="about.html">About</a>
    <a href="reviews.html">Reviews</a>
    <a href="payment.html" class="active">Pay</a>
  </nav>
  <span class="toggle" onclick="toggleDark()">🌙</span>
</header>

<section class="hero">
  <h1>Pay with PayFast</h1>
  <p>Securely complete your payment</p>
</section>

<section class="payment-form">
  <form action="https://www.payfast.co.za/eng/process" method="POST" id="payfastForm">
    <input type="hidden" name="merchant_id" value="YOUR_MERCHANT_ID">
    <input type="hidden" name="merchant_key" value="YOUR_MERCHANT_KEY">
    <input type="hidden" name="amount" id="pf_amount">
    <input type="hidden" name="item_name" id="pf_item_name">
    <input type="hidden" name="name_first" id="pf_name_first">
    <input type="hidden" name="name_last" id="pf_name_last">
    <input type="hidden" name="email_address" id="pf_email">
    <input type="hidden" name="return_url" value="YOUR_RETURN_URL">
    <input type="hidden" name="cancel_url" value="YOUR_CANCEL_URL">
    <input type="hidden" name="notify_url" value="YOUR_NOTIFY_URL">
    <button type="submit" class="submit-btn">Pay with PayFast</button>
  </form>
</section>

<footer>
  <p>© 2025 Sakhile Store</p>
</footer>

<script src="js/scripts.js"></script>
</body>
</html>
