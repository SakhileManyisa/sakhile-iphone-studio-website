<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Sakhile Store</title>

<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Lato', sans-serif;
  margin: 0;
  background: #f5f5f5;
  transition: 0.3s;
}

/* DARK MODE */
body.dark {
  background: #121212;
  color: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  color: #fff;
}

/* BUTTONS */
button {
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* FORM CARD */
.form-box {
  max-width: 600px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

body.dark .form-box {
  background: #1e1e1e;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
  background: #eee;
}

body.dark input,
body.dark select,
body.dark textarea {
  background: #333;
  color: #fff;
}

/* TITLE */
h2 {
  text-align: center;
}

/* ACTION BUTTONS */
.actions {
  display: flex;
  gap: 10px;
  justify-content: space-between;
}

.pay {
  background: #74ebd5;
}

.whatsapp {
  background: #25D366;
  color: #fff;
}

.dark-toggle {
  cursor: pointer;
}

/* SUCCESS */
#success {
  display: none;
  text-align: center;
  margin-top: 20px;
}

</style>
</head>

<body>

<header>
  <h2>Sakhile Checkout</h2>
  <div>
    <span class="dark-toggle" onclick="toggleDark()">🌙</span>
    <button onclick="goToCart()">🛒</button>
  </div>
</header>

<div class="form-box">

  <h2>Complete Your Order</h2>

  <form onsubmit="return fakePayment()">

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="amount" placeholder="Amount (R)" required>

    <select id="payment">
      <option value="">Select Payment Method</option>
      <option>Card</option>
      <option>Bank Transfer</option>
      <option>E-wallet</option>
    </select>

    <textarea id="notes" placeholder="Notes (optional)"></textarea>

    <div class="actions">
      <button class="pay">💳 Pay Now</button>
      <button type="button" class="whatsapp" onclick="whatsappCheckout()">📲 WhatsApp</button>
    </div>

  </form>

  <div id="success"></div>

</div>

<script>

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* CART LINK */
function goToCart(){
  window.location.href = "index.html"; // change if needed
}

/* FAKE PAYMENT */
function fakePayment(){
  let name = document.getElementById("name").value;

  document.getElementById("success").style.display="block";
  document.getElementById("success").innerHTML =
    `<h3>✅ Payment Successful</h3>
     <p>Thank you ${name}, your order is confirmed.</p>`;

  return false;
}

/* WHATSAPP */
function whatsappCheckout(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  let msg = `Hello, I want to pay R${amount}.\nName: ${name}`;
  window.open(`https://wa.me/27657377004?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
