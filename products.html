<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakhile iPhone Store PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">

<style>
body { font-family:Lato; margin:0; background:#f5f5f5; }

/* HEADER */
header {
  display:flex; justify-content:space-between;
  padding:15px; background:#111; color:#fff;
}

/* BUTTONS */
button { cursor:pointer; border:none; padding:6px 10px; border-radius:5px; }

/* PRODUCT GRID */
.products {
  display:flex; flex-wrap:wrap; gap:15px; padding:15px;
}

.product {
  width:200px; background:#fff; border-radius:10px;
  padding:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.product img { width:100%; height:150px; object-fit:contain; }

/* CART PANEL */
.cart {
  position:fixed; right:0; top:0;
  width:300px; height:100%;
  background:#fff; box-shadow:-5px 0 10px rgba(0,0,0,0.3);
  padding:15px; overflow:auto;
  display:none;
}

.cart h3 { margin-top:0; }

/* ADMIN PANEL */
.admin {
  padding:15px;
  background:#eee;
}

/* MODAL */
.modal {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none; justify-content:center; align-items:center;
}

.modal-content {
  background:#fff; padding:20px; border-radius:10px;
  width:300px;
}

</style>
</head>

<body>

<header>
  <h2>Sakhile Store</h2>
  <div>
    <button onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</button>
  </div>
</header>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: R<span id="total">0</span></h4>

  <button onclick="checkoutWhatsApp()">Checkout WhatsApp</button>
  <button onclick="payNow()">Pay Now</button>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="img" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>
</div>

<script>
let products = [
  {name:"iPhone 15 Pro", price:17000, img:"images/15_pro-removebg-preview.png"},
  {name:"iPhone 14 Pro", price:14500, img:"images/14_pro-removebg-preview.png"}
];

let cart = [];

/* DISPLAY PRODUCTS */
function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>R${p.price}</p>
        <button onclick="addToCart(${i})">🛒</button>
        <button onclick="viewProduct(${i})">🔍</button>
      </div>
    `;
  });
}

/* CART SYSTEM */
function addToCart(i){
  cart.push(products[i]);
  updateCart();
}

function updateCart(){
  let items = document.getElementById("cartItems");
  let total = 0;

  items.innerHTML = "";
  cart.forEach(p=>{
    total += p.price;
    items.innerHTML += `<p>${p.name} - R${p.price}</p>`;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

function toggleCart(){
  let cartEl = document.getElementById("cart");
  cartEl.style.display = cartEl.style.display === "block" ? "none" : "block";
}

/* WHATSAPP CHECKOUT */
function checkoutWhatsApp(){
  let message = "Order:%0A";
  cart.forEach(p=>{
    message += `${p.name} - R${p.price}%0A`;
  });

  message += `Total: R${document.getElementById("total").innerText}`;

  window.open(`https://wa.me/27657377004?text=${message}`);
}

/* PAYMENT (DEMO) */
function payNow(){
  alert("Connect PayFast or Stripe here");
}

/* PRODUCT PAGE (MODAL) */
function viewProduct(i){
  let p = products[i];

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.name}</h2>
    <img src="${p.img}" style="width:100%">
    <p>Price: R${p.price}</p>
    <button onclick="addToCart(${i})">Add to Cart</button>
    <button onclick="closeModal()">Close</button>
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ADMIN PANEL */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  products.push({name, price:parseInt(price), img});
  renderProducts();
}

/* INIT */
renderProducts();
</script>

</body>
</html>
