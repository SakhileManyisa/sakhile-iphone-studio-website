<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay with PayFast - Sakhile's iPhone Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#74ebd5;
  --gradient:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

/* BODY */
body{
  margin:0;
  font-family:'Lato',sans-serif;
  background:url('images/background1.avif') center/cover fixed;
  color:#333;
}
body.dark{
  background:#0f172a;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:var(--gradient);
  position:sticky;
  top:0;
}

.header-left{
  display:flex;
  align-items:center;
}
.header-left img{
  height:50px;
  margin-right:10px;
}

header h1{color:#fff;}

/* NAV */
nav a{
  color:#fff;
  margin:0 8px;
  padding:8px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  text-decoration:none;
}
nav a:hover{
  background:#fff;
  color:#333;
}

/* TOP ICONS */
.top-icons{
  display:flex;
  gap:10px;
}
.icon-btn{
  border:none;
  background:#fff;
  padding:8px 12px;
  border-radius:50%;
  cursor:pointer;
}

/* MAIN */
main{
  padding:40px 20px;
}

/* CARD */
.payment-box{
  max-width:600px;
  margin:auto;
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.9);
}
body.dark .payment-box{
  background:rgba(0,0,0,0.6);
}

/* FORM */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:25px;
  background:var(--gradient);
  color:#fff;
  font-size:1.1em;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="images/Logo.png">
    <h1>Sakhile's iPhone Studio</h1>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="reviews.html">Reviews</a>
  </nav>

  <div class="top-icons">
    <button class="icon-btn" onclick="toggleDark()">🌙</button>
    <button class="icon-btn">🛒 <span id="cartCount">0</span></button>
  </div>
</header>

<main>
  <div class="payment-box">
    <h2 style="text-align:center;">💳 Pay with PayFast</h2>

    <form action="https://www.payfast.co.za/eng/process" method="POST">

      <!-- YOUR PAYFAST DETAILS -->
      <input type="hidden" name="merchant_id" value="YOUR_MERCHANT_ID">
      <input type="hidden" name="merchant_key" value="YOUR_MERCHANT_KEY">

      <!-- CUSTOMER INFO -->
      <input type="text" name="name_first" placeholder="First Name" required>
      <input type="text" name="name_last" placeholder="Last Name" required>
      <input type="email" name="email_address" placeholder="Email Address" required>

      <!-- ORDER INFO -->
      <input type="text" name="amount" placeholder="Amount (ZAR)" required>
      <input type="text" name="item_name" value="iPhone Purchase" readonly>

      <!-- REDIRECTS -->
      <input type="hidden" name="return_url" value="thankyou.html">
      <input type="hidden" name="cancel_url" value="cancel.html">
      <input type="hidden" name="notify_url" value="notify.php">

      <button type="submit">Pay Now Securely</button>
    </form>
  </div>
</main>

<footer>
  © 2025 Sakhile's iPhone Studio
</footer>

<script>
/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle('dark');
}

/* CART */
let cart=JSON.parse(localStorage.getItem("cart"))||[];
document.getElementById("cartCount").innerText=cart.length;
</script>

</body>
</html>
